# Structured examples database for The Missing Guide.
#
# Each entry is a real paper cited as an example in a chapter. This file is
# the single source of truth — the per-chapter markdown files reference it,
# and tools (like the MkDocs site) can render example cards from it.
#
# Schema:
#   chapter: short slug of the chapter (e.g. "abstract", "title")
#   paper: full paper title
#   authors: comma-separated authors (use "et al." for >3)
#   venue: short venue + year (e.g. "NAACL 2019", "EMNLP 2020")
#   anthology_url: ACL Anthology URL if available, else other stable URL, else null
#   exemplifies: one-sentence statement of what this paper does well
#   notes: optional longer commentary
#
# When adding entries, keep alphabetical by chapter, then by year. Verify
# the URL resolves and the authors are correct against the Anthology.

